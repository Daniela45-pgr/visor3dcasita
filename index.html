<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Visor 3D</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c26;
    --border: rgba(255,255,255,0.08);
    --accent: #6c63ff;
    --accent2: #a78bfa;
    --text: #f0f0f8;
    --muted: #7a7a9a;
    --success: #22d3a0;
    --panel-h: 80px;
    --ctrl-h: 64px;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    overflow: hidden;
  }

  /* ── CANVAS ── */
  #canvas-wrap {
    position: fixed; inset: 0;
  }
  #canvas-wrap canvas {
    display: block; width: 100% !important; height: 100% !important;
  }

  /* ── DROP OVERLAY ── */
  #drop-zone {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: var(--bg);
    z-index: 10;
    transition: opacity .3s;
  }
  #drop-zone.drag-over { background: rgba(108,99,255,.08); }
  #drop-zone.hidden { opacity: 0; pointer-events: none; }

  .logo {
    font-size: clamp(2rem, 6vw, 4rem);
    font-weight: 700;
    letter-spacing: -2px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }
  .tagline {
    font-size: clamp(.85rem, 2vw, 1.1rem);
    color: var(--muted);
    margin-bottom: clamp(2rem, 5vw, 4rem);
    letter-spacing: .3px;
  }

  .upload-card {
    background: var(--surface);
    border: 2px dashed var(--border);
    border-radius: 24px;
    padding: clamp(2rem, 6vw, 4rem) clamp(2rem, 8vw, 6rem);
    text-align: center;
    cursor: pointer;
    transition: border-color .2s, background .2s;
    max-width: 520px; width: 90%;
  }
  .upload-card:hover, .drag-over .upload-card {
    border-color: var(--accent);
    background: rgba(108,99,255,.06);
  }

  .upload-icon {
    width: clamp(56px, 10vw, 80px);
    height: clamp(56px, 10vw, 80px);
    margin: 0 auto 20px;
    background: rgba(108,99,255,.15);
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
  }
  .upload-icon svg { width: 60%; height: 60%; }

  .upload-title {
    font-size: clamp(1rem, 3vw, 1.4rem);
    font-weight: 600;
    margin-bottom: 8px;
  }
  .upload-sub {
    font-size: clamp(.8rem, 2vw, .95rem);
    color: var(--muted);
    line-height: 1.6;
  }
  .badge {
    display: inline-block;
    background: rgba(108,99,255,.2);
    color: var(--accent2);
    border-radius: 6px;
    font-size: .75rem;
    font-weight: 600;
    padding: 2px 8px;
    margin: 6px 3px 0;
    letter-spacing: .5px;
  }

  #file-input { display: none; }

  .upload-btn {
    margin-top: 24px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 12px 28px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .2s, transform .1s;
  }
  .upload-btn:hover { opacity: .88; }
  .upload-btn:active { transform: scale(.97); }

  /* ── TOP BAR ── */
  #topbar {
    position: fixed; top: 0; left: 0; right: 0;
    height: var(--panel-h);
    background: linear-gradient(to bottom, rgba(10,10,15,.95), transparent);
    display: flex; align-items: center;
    padding: 0 clamp(12px, 4vw, 32px);
    gap: 12px;
    z-index: 5;
    opacity: 0; pointer-events: none;
    transition: opacity .4s;
  }
  #topbar.visible { opacity: 1; pointer-events: all; }

  .tb-logo {
    font-size: 1.2rem; font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    flex: 1;
  }
  #model-name {
    font-size: .85rem; color: var(--muted);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    max-width: clamp(100px, 30vw, 300px);
  }
  .tb-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 10px;
    padding: 8px 14px;
    font-size: .85rem;
    font-weight: 500;
    cursor: pointer;
    transition: background .15s;
    white-space: nowrap;
  }
  .tb-btn:hover { background: var(--surface2); }

  /* ── BOTTOM CONTROLS ── */
  #controls {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: var(--ctrl-h);
    background: linear-gradient(to top, rgba(10,10,15,.95), transparent);
    display: flex; align-items: center; justify-content: center;
    gap: clamp(6px, 2vw, 16px);
    z-index: 5;
    opacity: 0; pointer-events: none;
    transition: opacity .4s;
    padding: 0 clamp(8px, 3vw, 24px);
  }
  #controls.visible { opacity: 1; pointer-events: all; }

  .ctrl-btn {
    background: rgba(28,28,38,.85);
    backdrop-filter: blur(8px);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    width: clamp(44px, 8vw, 52px);
    height: clamp(44px, 8vw, 52px);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background .15s, border-color .15s;
    flex-shrink: 0;
  }
  .ctrl-btn:hover { background: var(--surface2); border-color: var(--accent); }
  .ctrl-btn svg { width: 22px; height: 22px; }

  .ctrl-btn.active { border-color: var(--accent); background: rgba(108,99,255,.2); }

  /* ── LOADING ── */
  #loader {
    position: fixed; inset: 0; display: none;
    align-items: center; justify-content: center;
    flex-direction: column; gap: 20px;
    background: var(--bg); z-index: 20;
  }
  #loader.show { display: flex; }
  .spinner {
    width: 48px; height: 48px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #load-msg { color: var(--muted); font-size: .95rem; }

  /* ── INFO PANEL ── */
  #info-panel {
    position: fixed; top: var(--panel-h); right: 16px;
    background: rgba(19,19,26,.92);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    font-size: .8rem;
    color: var(--muted);
    min-width: 180px;
    z-index: 5;
    display: none;
    line-height: 1.8;
  }
  #info-panel.show { display: block; }
  #info-panel strong { color: var(--text); display: block; margin-bottom: 6px; font-size: .85rem; }

  /* ── TV MODE ── */
  @media (min-width: 1280px) and (min-height: 720px) {
    :root { --panel-h: 100px; --ctrl-h: 80px; }
    .ctrl-btn { width: 64px; height: 64px; }
    .ctrl-btn svg { width: 28px; height: 28px; }
    .tb-btn { padding: 10px 20px; font-size: 1rem; }
    #info-panel { font-size: .95rem; min-width: 220px; }
  }

  /* ── MOBILE ── */
  @media (max-width: 480px) {
    :root { --panel-h: 60px; --ctrl-h: 60px; }
    .upload-card { padding: 2rem 1.5rem; }
    .ctrl-btn { width: 42px; height: 42px; }
    .ctrl-btn svg { width: 20px; height: 20px; }
  }

  /* ── HINT ── */
  #hint {
    position: fixed; bottom: calc(var(--ctrl-h) + 8px); left: 50%;
    transform: translateX(-50%);
    background: rgba(19,19,26,.9);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 14px;
    font-size: .75rem;
    color: var(--muted);
    white-space: nowrap;
    z-index: 5;
    opacity: 0;
    animation: fadehint 4s ease forwards;
  }
  @keyframes fadehint {
    0%   { opacity: 0; }
    10%  { opacity: 1; }
    70%  { opacity: 1; }
    100% { opacity: 0; }
  }
</style>
</head>
<body>

<!-- CANVAS -->
<div id="canvas-wrap"></div>

<!-- LOADING -->
<div id="loader">
  <div class="spinner"></div>
  <div id="load-msg">Cargando modelo…</div>
</div>

<!-- DROP ZONE -->
<div id="drop-zone">
  <div class="logo">Visor 3D</div>
  <div class="tagline">Visualiza tus modelos de Blender al instante</div>
  <div class="upload-card" id="upload-card">
    <div class="upload-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 16V8m0 0-3 3m3-3 3 3"/>
        <path d="M3 15v3a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-3"/>
        <path d="M7 10a5 5 0 0 1 10 0"/>
      </svg>
    </div>
    <div class="upload-title">Arrastra tu modelo aquí</div>
    <div class="upload-sub">
      o toca para seleccionar un archivo<br>
      <span class="badge">GLB</span>
      <span class="badge">GLTF</span>
      <span class="badge">OBJ</span>
    </div>
    <button class="upload-btn" onclick="document.getElementById('file-input').click()">Seleccionar archivo</button>
    <input type="file" id="file-input" accept=".glb,.gltf,.obj">
  </div>
</div>

<!-- TOP BAR -->
<div id="topbar">
  <div class="tb-logo">Visor 3D</div>
  <div id="model-name"></div>
  <button class="tb-btn" onclick="document.getElementById('file-input2').click()">
    <input type="file" id="file-input2" accept=".glb,.gltf,.obj" style="display:none">
    ↑ Nuevo modelo
  </button>
</div>

<!-- BOTTOM CONTROLS -->
<div id="controls">
  <!-- Rotar -->
  <button class="ctrl-btn active" id="btn-rotate" title="Rotar automático" onclick="toggleAuto()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12a9 9 0 0 0-9-9 9 9 0 0 0-6.3 2.55"/>
      <path d="m3 3 3.3 3.3M3 8.5V3h5.5"/>
    </svg>
  </button>
  <!-- Reset cámara -->
  <button class="ctrl-btn" title="Restablecer cámara" onclick="resetCamera()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 12a9 9 0 1 0 9-9 9 9 0 0 0-6.39 2.64"/>
      <path d="M3 3v6h6"/>
    </svg>
  </button>
  <!-- Alámbrico -->
  <button class="ctrl-btn" id="btn-wire" title="Modo alámbrico" onclick="toggleWire()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="18" height="18" rx="3"/>
      <path d="M3 9h18M3 15h18M9 3v18M15 3v18"/>
    </svg>
  </button>
  <!-- Info -->
  <button class="ctrl-btn" id="btn-info" title="Información del modelo" onclick="toggleInfo()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="9"/>
      <path d="M12 8v1m0 3v5"/>
    </svg>
  </button>
  <!-- Pantalla completa -->
  <button class="ctrl-btn" title="Pantalla completa" onclick="toggleFS()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 7V3h4M17 3h4v4M3 17v4h4M17 21h4v-4"/>
    </svg>
  </button>
  <!-- Fondo claro/oscuro -->
  <button class="ctrl-btn" title="Cambiar fondo" onclick="toggleBg()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="5"/>
      <path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
    </svg>
  </button>
</div>

<!-- INFO PANEL -->
<div id="info-panel">
  <strong>Modelo</strong>
  <div id="info-content">—</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

/* ── THREE SETUP ── */
const wrap = document.getElementById('canvas-wrap');
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.outputColorSpace = THREE.SRGBColorSpace;
wrap.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 1000);
camera.position.set(0, 2, 5);

const pmremGenerator = new THREE.PMREMGenerator(renderer);
const envTexture = pmremGenerator.fromScene(new RoomEnvironment()).texture;
scene.environment = envTexture;

let bgDark = true;
scene.background = new THREE.Color(0x0a0a0f);

/* lights */
const ambient = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambient);
const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
dirLight.position.set(5, 8, 5);
dirLight.castShadow = true;
scene.add(dirLight);
const fillLight = new THREE.DirectionalLight(0x8080ff, 0.3);
fillLight.position.set(-5, 2, -5);
scene.add(fillLight);

/* grid */
const grid = new THREE.GridHelper(20, 20, 0x222233, 0x222233);
grid.visible = false;
scene.add(grid);

/* controls */
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.minDistance = 0.1;
controls.maxDistance = 100;

/* ── STATE ── */
let currentMesh = null;
let autoRotate = true;
let wireMode = false;
let infoVisible = false;
let modelInfo = { vertices: 0, triangles: 0, meshes: 0, name: '' };
let initialCamPos = new THREE.Vector3();
let initialTarget = new THREE.Vector3();
let loadingDefault = false;

/* ── RESIZE ── */
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

/* ── ANIMATE ── */
function animate() {
  requestAnimationFrame(animate);
  if (autoRotate && currentMesh) currentMesh.rotation.y += 0.005;
  controls.update();
  renderer.render(scene, camera);
}
animate();

/* ── LOAD MODEL ── */
function loadFile(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  const url = URL.createObjectURL(file);
  loadFromURL(url, ext, file.name);
}

function loadFromURL(url, ext, displayName) {
  document.getElementById('loader').classList.add('show');
  document.getElementById('load-msg').textContent = 'Cargando modelo…';
  document.getElementById('drop-zone').classList.add('hidden');

  if (currentMesh) { scene.remove(currentMesh); currentMesh = null; }

  if (ext === 'glb' || ext === 'gltf') {
    const loader = new GLTFLoader();
    loader.load(url, gltf => {
      onLoaded(gltf.scene, displayName);
    }, xhr => {
      const pct = xhr.total ? Math.round(xhr.loaded / xhr.total * 100) : Math.round(xhr.loaded / 1024);
      document.getElementById('load-msg').textContent = xhr.total ? `Cargando… ${pct}%` : `Cargando… ${pct} KB`;
    }, err => onError(err));
  } else if (ext === 'obj') {
    const loader = new OBJLoader();
    loader.load(url, obj => onLoaded(obj, displayName), null, err => onError(err));
  } else {
    onError(new Error('Formato no soportado: .' + ext));
  }
}

/* ── AUTO-CARGA DEL MODELO PRINCIPAL ── */
const DEFAULT_MODEL_URL = 'CasaDany1.glb';
const DEFAULT_MODEL_NAME = 'CasaDany1.glb';

function autoLoadDefaultModel() {
  loadingDefault = true;
  loadFromURL(DEFAULT_MODEL_URL, 'glb', DEFAULT_MODEL_NAME);
}

function onLoaded(object, fileName) {
  loadingDefault = false;
  /* center & scale */
  const box = new THREE.Box3().setFromObject(object);
  const size = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z);
  const scale = 3 / maxDim;
  object.scale.setScalar(scale);
  object.position.sub(center.multiplyScalar(scale));

  /* shadows + stats */
  let verts = 0, tris = 0, meshCount = 0;
  object.traverse(child => {
    if (child.isMesh) {
      child.castShadow = true;
      child.receiveShadow = true;
      meshCount++;
      if (child.geometry) {
        const pos = child.geometry.attributes.position;
        if (pos) verts += pos.count;
        const idx = child.geometry.index;
        tris += idx ? idx.count / 3 : pos ? pos.count / 3 : 0;
      }
    }
  });

  modelInfo = { vertices: verts, triangles: Math.round(tris), meshes: meshCount, name: fileName };
  updateInfoPanel();

  scene.add(object);
  currentMesh = object;
  grid.visible = true;

  /* fit camera */
  const newBox = new THREE.Box3().setFromObject(object);
  const newSize = newBox.getSize(new THREE.Vector3());
  const newCenter = newBox.getCenter(new THREE.Vector3());
  const dist = Math.max(newSize.x, newSize.y, newSize.z) * 2;
  camera.position.set(newCenter.x, newCenter.y + dist * .3, newCenter.z + dist);
  controls.target.copy(newCenter);
  controls.update();
  initialCamPos.copy(camera.position);
  initialTarget.copy(controls.target);

  document.getElementById('topbar').classList.add('visible');
  document.getElementById('controls').classList.add('visible');
  document.getElementById('loader').classList.remove('show');
  document.getElementById('model-name').textContent = fileName;
  showHint();
}

function onError(err) {
  console.error(err);
  document.getElementById('loader').classList.remove('show');
  document.getElementById('drop-zone').classList.remove('hidden');
  if (loadingDefault) {
    loadingDefault = false;
    document.getElementById('load-msg').textContent = 'Cargando modelo…';
    return; // muestra silenciosamente la pantalla de subida manual
  }
  alert('No se pudo cargar el modelo. Asegúrate de que sea GLB, GLTF u OBJ válido.');
}

function updateInfoPanel() {
  document.getElementById('info-content').innerHTML =
    `📄 ${modelInfo.name}<br>
     🔷 ${modelInfo.meshes} mallas<br>
     ◼ ${modelInfo.vertices.toLocaleString('es')} vértices<br>
     △ ${modelInfo.triangles.toLocaleString('es')} triángulos`;
}

function showHint() {
  const old = document.getElementById('hint');
  if (old) old.remove();
  const h = document.createElement('div');
  h.id = 'hint';
  const touch = 'ontouchstart' in window;
  h.textContent = touch
    ? 'Un dedo: rotar • Dos dedos: zoom y mover'
    : 'Clic: rotar • Rueda: zoom • Clic derecho: mover';
  document.body.appendChild(h);
  setTimeout(() => h.remove(), 4500);
}

/* ── CONTROLS ── */
window.toggleAuto = () => {
  autoRotate = !autoRotate;
  document.getElementById('btn-rotate').classList.toggle('active', autoRotate);
};

window.resetCamera = () => {
  camera.position.copy(initialCamPos);
  controls.target.copy(initialTarget);
  controls.update();
};

window.toggleWire = () => {
  wireMode = !wireMode;
  document.getElementById('btn-wire').classList.toggle('active', wireMode);
  if (!currentMesh) return;
  currentMesh.traverse(child => {
    if (child.isMesh) child.material.wireframe = wireMode;
  });
};

window.toggleInfo = () => {
  infoVisible = !infoVisible;
  document.getElementById('btn-info').classList.toggle('active', infoVisible);
  document.getElementById('info-panel').classList.toggle('show', infoVisible);
};

window.toggleFS = () => {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen?.();
  else document.exitFullscreen?.();
};

window.toggleBg = () => {
  bgDark = !bgDark;
  scene.background = new THREE.Color(bgDark ? 0x0a0a0f : 0xf0f0f8);
  document.body.style.background = bgDark ? '#0a0a0f' : '#f0f0f8';
};

/* ── FILE INPUT ── */
const handleFile = e => { if (e.target.files[0]) loadFile(e.target.files[0]); };
document.getElementById('file-input').addEventListener('change', handleFile);
document.getElementById('file-input2').addEventListener('change', handleFile);
document.getElementById('upload-card').addEventListener('click', e => {
  if (e.target.tagName !== 'BUTTON') document.getElementById('file-input').click();
});

/* ── DRAG & DROP ── */
const dz = document.getElementById('drop-zone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f) loadFile(f);
});
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => {
  e.preventDefault();
  if (!document.getElementById('drop-zone').classList.contains('hidden')) return;
  const f = e.dataTransfer.files[0];
  if (f) loadFile(f);
});

/* ── INICIO: cargar la casa automáticamente ── */
autoLoadDefaultModel();

</script>
</body>
</html>
